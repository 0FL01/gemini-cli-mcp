name: CI and Release

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Тип релиза'
        required: true
        default: 'rolling'
        type: choice
        options:
          - rolling
          - stable
      version:
        description: 'Версия для stable релиза (например: 1.2.3). Игнорируется для rolling.'
        required: false
        type: string
  schedule:
    - cron: '0 0 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      - name: Run rustfmt
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-features --verbose

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - name: Run cargo check
        run: cargo check --all-features --verbose

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [test, lint]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: gemini-mcp-server
            asset_name: gemini-mcp-server-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gemini-mcp-server.exe
            asset_name: gemini-mcp-server-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: gemini-mcp-server
            asset_name: gemini-mcp-server-macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release-rolling:
    name: Create Rolling Release (Pre-release)
    runs-on: ubuntu-24.04
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'rolling')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Set SHORT_SHA env
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Prepare assets
        run: |
          mkdir -p dist
          for dir in artifacts/*/; do
            dirname=$(basename "$dir")
            cp "${dir}"* "dist/${dirname}"
          done
          chmod +x dist/*
      - name: Delete existing rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete rolling --cleanup-tag --yes || true
      - name: Create rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create rolling \
            --target ${{ github.sha }} \
            --title "Rolling Release (${{ env.SHORT_SHA }})" \
            --notes "Latest rolling build from commit ${{ env.SHORT_SHA }}. Built from branch \`main\`.

          ⚠ WARNING: This is a pre-release build and may not be stable. Use at your own risk." \
            --prerelease \
            dist/*

  release-stable:
    name: Create Stable Release
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'stable'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Validate version input
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -z "$VERSION" ]; then
            echo "Error: version input is required for stable releases"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in semver format (e.g., 1.2.3)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Prepare assets
        run: |
          mkdir -p dist
          for dir in artifacts/*/; do
            dirname=$(basename "$dir")
            cp "${dir}"* "dist/${dirname}"
          done
          chmod +x dist/*
      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"
      - name: Check if release exists
        id: check_release
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create stable release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ env.VERSION }}
        run: |
          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --notes "Stable release v${VERSION}. This is a production-ready build." \
            --latest \
            dist/*
